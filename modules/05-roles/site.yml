---
# Master playbook: applies all roles to appropriate hosts
# Run: ansible-playbook modules/05-roles/site.yml

# Play 1: Common setup on ALL servers
- name: Apply common configuration to all servers
  hosts: all
  become: yes
  roles:
    - common

# Play 2: Docker on all servers
- name: Install Docker on all servers
  hosts: all
  become: yes
  roles:
    - role: docker
      docker_users:
        - "{{ ansible_user }}"

# Play 3: Nginx on Ubuntu servers only
- name: Deploy web server on Ubuntu hosts
  hosts: ubuntu
  become: yes
  roles:
    - role: nginx
      nginx_listen_port: 80
