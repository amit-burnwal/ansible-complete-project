---
# Playbook 3: Install packages across all OS types
# Run: ansible-playbook modules/01-basics/03_install_packages.yml

- name: Install common utility packages
  hosts: all
  become: yes

  tasks:
    - name: Install tree
      package:
        name: tree
        state: present

    - name: Install htop
      package:
        name: htop
        state: present

    - name: Install vim
      package:
        name: vim
        state: present

    - name: Verify tree is installed
      command: tree --version
      changed_when: false
      register: tree_version

    - name: Show tree version
      debug:
        msg: "{{ tree_version.stdout }}"
